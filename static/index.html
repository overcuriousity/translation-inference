<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translation</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <img src="/static/favicon.svg" alt="Logo" class="app-logo" width="26" height="26" />
      <span class="app-title">Translation</span>
    </div>
    <div class="header-controls">
      <div class="select-group">
        <label class="select-label">Translation</label>
        <select id="model-select" class="select-compact" title="Translation Model"></select>
      </div>
      <div class="select-group">
        <label class="select-label">Transcription</label>
        <select id="whisper-model-select" class="select-compact" title="Transcription Model (Whisper)"></select>
      </div>
      <button id="settings-btn" class="settings-btn" title="API Settings">

          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- API config panel -->
  <div id="config-panel" class="config-panel hidden">
    <div class="config-inner">
      <div class="config-title">API Configuration</div>
      <!-- Gated access row (shown only when gated tier is available server-side) -->
      <div id="gated-row" class="config-row hidden">
        <input id="config-accesskey" type="password" class="config-input" placeholder="Access Key" />
        <button id="config-gated-btn" class="btn-primary">Unlock</button>
        <span id="gated-msg" class="config-msg"></span>
      </div>
      <div id="config-separator" class="config-separator hidden">
        <span>or bring your own endpoint</span>
      </div>
      <!-- BYOK row -->
      <div class="config-row">
        <input id="config-endpoint" type="url" class="config-input" placeholder="Endpoint URL" />
        <input id="config-apikey" type="password" class="config-input" placeholder="API Key" />
        <button id="config-connect-btn" class="btn-primary">Connect</button>
        <span id="config-msg" class="config-msg"></span>
      </div>
      <!-- TTS BYOK row -->
      <div class="config-row">
        <input id="config-tts-endpoint" type="url" class="config-input" placeholder="TTS Endpoint URL (optional)" />
        <input id="config-tts-apikey" type="password" class="config-input" placeholder="TTS API Key (optional)" />
        <button id="config-tts-btn" class="btn-primary">Set TTS</button>
        <span id="tts-msg" class="config-msg"></span>
      </div>
    </div>
  </div>

  <main class="panels">
    <!-- Source panel -->
    <div class="panel panel-source">
      <div class="panel-header source-header">
        <div class="mode-tabs">
          <button id="tab-text" class="mode-tab active">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
            Text
          </button>
          <button id="tab-document" class="mode-tab hidden">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            File
          </button>
          <button id="tab-conversation" class="mode-tab">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Conversation
          </button>
        </div>
        <div id="source-lang-info" class="source-lang-info">
          <span class="lang-label">Auto-detect</span>
          <span id="detected-lang" class="detected-badge hidden"></span>
        </div>
      </div>
      <div class="textarea-container">
        <textarea
          id="source-text"
          class="panel-textarea"
          placeholder="Enter text or upload files…"
          spellcheck="false"
        ></textarea>
        <div id="drop-overlay" class="drop-overlay hidden">
          <div class="drop-msg">Drop audio or video files to transcribe</div>
        </div>
      </div>
      <div id="doc-upload-area" class="doc-upload-area hidden">
        <label for="doc-file-input" class="doc-upload-zone">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          <span class="doc-upload-text">Drop subtitle files here or <span class="doc-upload-link">browse</span></span>
          <span class="doc-upload-hint">SRT, VTT &middot; max 50 MB</span>
        </label>
        <input type="file" id="doc-file-input" accept=".srt,.vtt" multiple hidden />
      </div>

      <!-- Conversation panel (shown when Conversation tab is active) -->
      <div id="conv-panel" class="conv-panel hidden">
        <div class="conv-speakers">
          <div class="conv-speaker">
            <div class="conv-speaker-header">
              <select id="conv-lang-a" class="conv-lang-sel"></select>
              <button id="conv-mic-a" class="conv-mic-btn" aria-label="Record speaker A" aria-pressed="false" title="Record speaker A">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
              </button>
            </div>
            <div id="conv-transcript-a" class="conv-transcript"></div>
          </div>
          <div class="conv-divider"></div>
          <div class="conv-speaker">
            <div class="conv-speaker-header">
              <button id="conv-mic-b" class="conv-mic-btn conv-mic-btn-right" aria-label="Record speaker B" aria-pressed="false" title="Record speaker B">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
              </button>
              <select id="conv-lang-b" class="conv-lang-sel"></select>
            </div>
            <div id="conv-transcript-b" class="conv-transcript"></div>
          </div>
        </div>
        <div class="conv-footer">
          <label class="conv-auto-tts-label">
            <input type="checkbox" id="conv-auto-tts" checked>
            Auto-speak
          </label>
          <button id="conv-clear-btn" class="btn-ghost">Clear</button>
          <button id="conv-export-btn" class="btn-ghost">Export</button>
        </div>
      </div>

      <!-- Context hint row (shown when toggle is clicked in text mode) -->
      <div id="context-hint-row" class="context-hint-row hidden">
        <input type="text" id="context-hint" class="context-hint-input" placeholder="e.g. medical, legal contract, casual chat between friends…" maxlength="200" autocomplete="off" spellcheck="false" />
      </div>

      <div class="panel-footer">
        <div class="footer-left">
          <label id="upload-label" class="icon-btn" title="Upload audio or video for transcription">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <input type="file" id="file-input" accept="audio/*,video/*" multiple hidden />
          </label>
          <button id="voice-btn" class="icon-btn" title="Record voice input" aria-label="Record voice input" aria-pressed="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <button id="src-tts-btn" class="icon-btn hidden" title="Read source aloud" aria-label="Read source aloud" aria-pressed="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <span id="char-count" class="char-count">0</span>
          <button id="context-hint-toggle" class="icon-btn hidden" title="Add domain/context hint" aria-label="Add domain/context hint" aria-pressed="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          </button>
        </div>
        <div class="footer-right">
          <button id="save-src-btn" class="icon-btn hidden" title="Save to Bitvault">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          </button>
          <button id="clear-btn" class="btn-ghost" title="Clear">Clear</button>
          <button id="translate-btn" class="btn-primary" title="Translate (Ctrl+Enter)">Translate</button>
        </div>
      </div>
      <div id="transcribe-status" class="status-bar hidden"></div>
    </div>

    <button id="swap-btn" class="swap-btn" title="Swap languages">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 16-4-4 4-4"/><path d="m17 8 4 4-4 4"/><path d="M3 12h18"/></svg>
    </button>

    <!-- Output panel -->
    <div class="panel panel-output">
      <div class="panel-header">
        <div id="lang-picker" class="lang-picker">
          <button id="lang-picker-btn" class="lang-picker-btn" aria-haspopup="listbox" aria-expanded="false">
            <span id="lang-picker-label">Select language</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lang-picker-chevron"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div id="lang-picker-dropdown" class="lang-picker-dropdown hidden">
            <div class="lang-search-row">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input id="lang-search" type="text" class="lang-search-input" placeholder="Search languages…" autocomplete="off" spellcheck="false" />
            </div>
            <ul id="lang-list" class="lang-list" role="listbox"></ul>
          </div>
        </div>
      </div>
      <div id="output-text" class="panel-output-content">
        <span class="placeholder">Translation will appear here…</span>
      </div>
      <div id="para-output" class="para-output hidden"></div>
      <div id="results-doc-list" class="hidden"></div>

      <div class="panel-footer">
        <div class="footer-left">
          <button id="tts-btn" class="icon-btn hidden" title="Read aloud" aria-label="Read aloud" aria-pressed="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <span id="chunk-progress" class="chunk-progress hidden"></span>
          <span id="incomplete-badge" class="incomplete-badge hidden">Incomplete</span>
        </div>
        <div class="footer-right">
          <button id="para-toggle-btn" class="icon-btn hidden" title="Side-by-side paragraph view" aria-label="Side-by-side paragraph view" aria-pressed="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>
          </button>
          <button id="md-toggle-btn" class="icon-btn hidden" title="Render as Markdown" aria-label="Render as Markdown" aria-pressed="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="14" viewBox="0 0 208 128" fill="currentColor" stroke="none"><rect width="198" height="118" x="5" y="5" ry="10" fill="none" stroke="currentColor" stroke-width="10"/><path d="M30 98V30h20l20 25 20-25h20v68H90V59L70 84 50 59v39zm125 0l-30-33h20V30h20v35h20z"/></svg>
          </button>
          <button id="copy-btn" class="icon-btn hidden" title="Copy translation">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button id="save-out-btn" class="icon-btn hidden" title="Save to Bitvault">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <div id="notification" class="notification hidden"></div>

  <footer class="app-footer">
    <a href="https://github.com/overcuriousity/translation-inference">Translation</a>
    &middot;
    <a href="/docs">API</a>
    &middot;
    <a id="footer-commit" href="https://github.com/overcuriousity/translation-inference" aria-label="Repository commit" style="font-family:monospace">—</a>
  </footer>

  <script src="/static/purify.min.js"></script>
  <script src="/static/marked.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
